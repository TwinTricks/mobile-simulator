<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mobile Simulator</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>Mobile Simulator</h1>
    <p class="muted">Test how websites look on phones, tablets, and desktops.</p>

    <label class="field">
      <span>URL to simulate</span>
      <input id="url" type="url" placeholder="https://example.com" autocomplete="off">
    </label>

    <button id="open-btn" class="btn-primary">
      <span class="btn-label">Open simulator</span>
      <span class="btn-icon" data-icon="arrow-right"></span>
    </button>
    <button id="current-btn" class="btn-secondary">
      <span class="btn-icon" data-icon="eye"></span>
      <span class="btn-label">Simulate current tab</span>
    </button>

    <p class="hint">Opens a full tab with side-by-side device frames.</p>
  </div>
  <script type="module" src="popup.js"></script>
</body>
</html>
